name: Build FFmpeg 8.1 for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson nasm ninja-build pkg-config cmake autoconf automake libtool

      - name: Set NDK path
        run: |
          echo "ANDROID_SDK_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Build FFmpeg
        run: |
          chmod +x ffmpeg-android-maker.sh
          ./ffmpeg-android-maker.sh -abis=arm64-v8a,armeabi-v7a -android=26 -mp3lame

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-8.1-audio-only
          path: output/
          retention-days: 7
